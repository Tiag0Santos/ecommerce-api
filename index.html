<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-commerce</title>
    <link rel="stylesheet" href="/css/styleGlobal.css">
    <link rel="stylesheet" href="/css/styleHome.css">
</head>
<body>
    <header>
        <nav>
            <h1>Mini E-commerce</h1>
            <div>
                <a href="index.html">Produtos</a>
                <a href="carrinho.html">
                Carrinho (<span id="contador">0</span>)</a> 
                <input type="text" id="input-busca" placeholder="Buscar produtos...">
            </div>  
        </nav>
    </header>
    <section class="filtros">
        <button class="btn-categoria" data-categoria="todos" data-nome="Todos">Todos</button>
        <button class="btn-categoria" data-categoria="groceries" data-nome="Alimentos">Alimentos</button>
        <button class="btn-categoria" data-categoria="beauty" data-nome="Beleza">Beleza</button>
        <button class="btn-categoria" data-categoria="furniture" data-nome="Móveis">Móveis</button>
        <button class="btn-categoria" data-categoria="fragrances" data-nome="Perfumes">Perfumes</button>       
    </section>
    <main>
        <div id="produtos"></div>
    </main> 
    <section>
        <div id="toast" class="toast">
            Produto adicionado no carrinho
        </div>
    </section>
    <script type="module" src="/js/pages/home.js"></script>
</body>
</html>
